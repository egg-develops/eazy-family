<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>Eazy.Family — The Voice-First Family Hub</title>
    <meta name="description" content="Sync every family calendar, manage shared tasks and shopping lists, and let your voice run it all. One button. Your whole family, finally organised." />
    <meta name="author" content="Eazy.Family" />
    <link rel="canonical" href="https://eazy.family/" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
    <link rel="apple-touch-startup-image" href="/logo.png" />

    <!-- PWA -->
    <meta name="theme-color" content="#964735" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Eazy.Family" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Eazy.Family" />
    <meta property="og:url" content="https://eazy.family/" />
    <meta property="og:title" content="Eazy.Family — One Eazy place for your family" />
    <meta property="og:description" content="Shared calendars, shopping, and to-do lists with AI assistant." />
    <meta property="og:image" content="https://eazy.family/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Eazy.Family — Your family's private digital home" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@eazy_family" />
    <meta name="twitter:title" content="Eazy.Family — One Eazy place for your family" />
    <meta name="twitter:description" content="Shared calendars, shopping, and to-do lists with AI assistant." />
    <meta name="twitter:image" content="https://eazy.family/og-image.png" />

    <!-- Structured Data: Organization + Website -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://eazy.family/#organization",
          "name": "Eazy.Family",
          "url": "https://eazy.family",
          "logo": {
            "@type": "ImageObject",
            "url": "https://eazy.family/logo.png"
          },
          "description": "Family organisation app — shared calendars, to-do lists, family messaging, local events and parent community.",
          "applicationCategory": "LifestyleApplication",
          "operatingSystem": "iOS, Web"
        },
        {
          "@type": "WebSite",
          "@id": "https://eazy.family/#website",
          "url": "https://eazy.family",
          "name": "Eazy.Family",
          "description": "Your family's private digital home",
          "publisher": { "@id": "https://eazy.family/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://eazy.family/events?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "SoftwareApplication",
          "@id": "https://eazy.family/#app",
          "name": "Eazy.Family",
          "url": "https://eazy.family",
          "applicationCategory": "LifestyleApplication",
          "operatingSystem": "iOS 15+, Web",
          "downloadUrl": "https://apps.apple.com/app/id6765778216",
          "installUrl": "https://apps.apple.com/app/id6765778216",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "CHF",
            "url": "https://apps.apple.com/app/id6765778216"
          },
          "description": "All-in-one family organisation: shared calendars, shopping lists, to-dos, local events and private messaging.",
          "featureList": [
            "Shared family calendar",
            "Shared shopping and to-do lists",
            "Family messaging",
            "Local family event discovery",
            "Parent community",
            "Cross-device sync"
          ]
        }
      ]
    }
    </script>

    <!-- FAQ structured data — surfaced in Google rich results and cited by AI
         assistants (ChatGPT, Claude, Perplexity) for family-organiser queries.
         Keep answers short, factual and self-contained. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Eazy.Family?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Eazy.Family is a voice-first family organiser app. It brings your family's shared calendar, shopping and to-do lists, task assignments and private messaging into one place — controllable by voice through a single button and an AI assistant."
          }
        },
        {
          "@type": "Question",
          "name": "Is Eazy.Family free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Eazy.Family is free to download and includes a 14-day free trial. After the trial it becomes a subscription, and a single subscription covers your entire family — you don't pay per person."
          }
        },
        {
          "@type": "Question",
          "name": "What devices does Eazy.Family work on?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Eazy.Family is available on iPhone and iPad (iOS 15 or later) from the App Store, and in any modern web browser. An Android version is coming soon."
          }
        },
        {
          "@type": "Question",
          "name": "What languages does Eazy.Family support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Eazy.Family is fully available in English, German, French, Italian, Spanish and Portuguese, including voice input."
          }
        },
        {
          "@type": "Question",
          "name": "How does the voice assistant work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tap the EZ button and speak naturally — for example, 'add swimming Tuesday at 4pm and tell Mum'. The AI assistant creates the event, task or list item and assigns it to the right family member automatically."
          }
        },
        {
          "@type": "Question",
          "name": "Does one subscription cover the whole family?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. One family subscription unlocks premium features for every member you invite, so the whole household is covered by a single plan."
          }
        },
        {
          "@type": "Question",
          "name": "Is our family's data private?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Eazy.Family is a private space for your household — your calendar, lists and messages are shared only with the family members you invite."
          }
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
