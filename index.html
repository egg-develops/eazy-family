<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eazy.Family — Your Family's Private Digital Home</title>
    <meta name="description" content="Shared calendars, to-do lists, family messaging, local events and community — all in one private space for modern families." />
    <meta name="author" content="Eazy.Family" />
    <link rel="canonical" href="https://eazy.family/" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
    <link rel="apple-touch-startup-image" href="/logo.png" />

    <!-- PWA -->
    <meta name="theme-color" content="#3d0d6b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Eazy.Family" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Eazy.Family" />
    <meta property="og:url" content="https://eazy.family/" />
    <meta property="og:title" content="Eazy.Family — Your Family's Private Digital Home" />
    <meta property="og:description" content="Shared calendars, to-do lists, family messaging, local events and community — all in one private space for modern families." />
    <meta property="og:image" content="https://eazy.family/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@eazy_family" />
    <meta name="twitter:title" content="Eazy.Family — Your Family's Private Digital Home" />
    <meta name="twitter:description" content="Shared calendars, to-do lists, family messaging, local events and community — all in one private space." />
    <meta name="twitter:image" content="https://eazy.family/og-image.png" />

    <!-- Structured Data: Organization + Website -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://eazy.family/#organization",
          "name": "Eazy.Family",
          "url": "https://eazy.family",
          "logo": {
            "@type": "ImageObject",
            "url": "https://eazy.family/logo.png"
          },
          "description": "Family organisation app — shared calendars, to-do lists, family messaging, local events and parent community.",
          "applicationCategory": "LifestyleApplication",
          "operatingSystem": "Web, iOS (coming soon), Android (coming soon)"
        },
        {
          "@type": "WebSite",
          "@id": "https://eazy.family/#website",
          "url": "https://eazy.family",
          "name": "Eazy.Family",
          "description": "Your family's private digital home",
          "publisher": { "@id": "https://eazy.family/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://eazy.family/events?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "SoftwareApplication",
          "@id": "https://eazy.family/#app",
          "name": "Eazy.Family",
          "url": "https://eazy.family",
          "applicationCategory": "LifestyleApplication",
          "operatingSystem": "Web",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          },
          "description": "All-in-one family organisation: shared calendars, shopping lists, to-dos, local events and private messaging.",
          "featureList": [
            "Shared family calendar",
            "Shared shopping and to-do lists",
            "Family messaging",
            "Local family event discovery",
            "Parent community",
            "Cross-device sync"
          ]
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
