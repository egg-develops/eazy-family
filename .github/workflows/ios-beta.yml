name: iOS Beta (TestFlight)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'ios/**'
      - 'capacitor.config.*'
      - 'fastlane/**'

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # Match the Vercel + Android pipelines. Plain `npm ci` fails here on a
        # peer-dep conflict / lockfile strictness and silently blocked every
        # TestFlight upload since 2026-06-05.
        run: npm install --legacy-peer-deps

      - name: Build web app
        # Vite inlines VITE_* at build time. Without these the bundle ships with
        # an undefined Supabase URL/key and the app white-screens on launch
        # (build 174). These are public client keys (they ship in the bundle).
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_REVENUECAT_IOS_KEY: ${{ secrets.VITE_REVENUECAT_IOS_KEY }}
          VITE_REVENUECAT_ANDROID_KEY: ${{ secrets.VITE_REVENUECAT_ANDROID_KEY }}
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Patch Package.swift for Xcode 16.4 compatibility
        run: |
          sed -i '' 's/\.iOS(\.v18)/\.iOS(\.v17)/g' ios/App/CapApp-SPM/Package.swift
          echo "Patched Package.swift:"
          grep "platforms" ios/App/CapApp-SPM/Package.swift

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('ios/App/CapApp-SPM/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -disablePackageRepositoryCache \
            | grep -E "error:|warning:|Resolve|Fetch|Checkout" || true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      - name: Write API key
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}" | base64 --decode > fastlane/AuthKey_4H662N6NAJ.p8

      - name: Configure git credentials for Match
        run: git config --global url."https://x-access-token:${{ secrets.MATCH_GIT_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Run Fastlane beta
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: fastlane ios beta
